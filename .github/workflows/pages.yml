name: Deploy Vite to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      project_dir: ${{ steps.detect.outputs.project_dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect project directory
        id: detect
        shell: bash
        run: |
          set -e
          PROJECT_DIR=$(find . -maxdepth 3 -name package.json \
            -not -path "*/node_modules/*" \
            -not -path "*/.github/*" | head -n 1 | xargs dirname)
          if [ -z "$PROJECT_DIR" ]; then
            echo "No package.json found"
            exit 1
          fi
          echo "Detected PROJECT_DIR=$PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install
        working-directory: ${{ steps.detect.outputs.project_dir }}

      - name: Build
        run: npm run build
        working-directory: ${{ steps.detect.outputs.project_dir }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.detect.outputs.project_dir }}/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
